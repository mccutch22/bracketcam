# Builds an unsigned BracketCam.ipa on GitHub's free macOS runners.
# Download it from the run's "Artifacts" section, then install with
# Sideloadly or AltStore on Windows (see SETUP.md).
name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, Release, device)
        run: |
          xcodebuild \
            -project BracketCam.xcodeproj \
            -scheme BracketCam \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/BracketCam.app" Payload/
          zip -qry BracketCam.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BracketCam-ipa
          path: BracketCam.ipa
          retention-days: 30
